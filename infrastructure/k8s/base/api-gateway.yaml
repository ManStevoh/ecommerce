apiVersion: v1
kind: Namespace
metadata:
  name: nexora-commerce
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexora-config
  namespace: nexora-commerce
data:
  NODE_ENV: production
  BASE_DOMAIN: nexora.cloud
  MEILISEARCH_HOST: http://meilisearch:7700
  REDIS_URL: redis://redis:6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexora-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nexora/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: nexora-config
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexora-commerce
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-api
  namespace: nexora-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graphql-api
  template:
    metadata:
      labels:
        app: graphql-api
    spec:
      containers:
        - name: graphql-api
          image: nexora/graphql-api:latest
          ports:
            - containerPort: 3014
          envFrom:
            - configMapRef:
                name: nexora-config
---
apiVersion: v1
kind: Service
metadata:
  name: graphql-api
  namespace: nexora-commerce
spec:
  selector:
    app: graphql-api
  ports:
    - port: 3014
      targetPort: 3014
